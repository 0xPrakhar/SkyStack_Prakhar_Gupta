databases:
  - name: eventify-db
    plan: free
    databaseName: eventify
    user: eventify_user

services:
  - type: web
    name: eventify-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URLS
        fromService:
          type: web
          name: eventify-web
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: eventify-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@eventify.local
      - key: DEFAULT_ADMIN_PASSWORD
        generateValue: true

  - type: web
    name: eventify-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: eventify-api
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
